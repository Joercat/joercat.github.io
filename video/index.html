<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video</title>
    <style>
        /* Reset all spacing on the wrapper elements */
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%; 
            overflow: hidden; /* Prevents scrollbars */
            background-color: black; /* Prevents white flashes */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Removes bottom alignment gap */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://smodusermc-storage.static.hf.space/Jun 21, 2020 at 8_56 AM.MOV" 
        title="Video"
        allow="autoplay; fullscreen"
        allowfullscreen>
    </iframe>

</body>
</html>
